figartion ; =============================================================================
; PlatformIO — Firmware station pollution (ESP32 DevKit V1)
; =============================================================================
; Documentation projet :
;   - Schéma électronique : documentation/SCHEMA_ELECTRONIQUE.svg
;   - Contrat MQTT       : emissions/<zone>/<sensorType> (backend mqttService.js)
;   - Simulateur de réf. : iot/config/simulatorConfig.js
;
; Carte cible : ESP32 DevKit V1 (esp32doit-devkit-v1)
; Framework   : Arduino (couche WiFi / MQTT / capteurs simplifiée)
; =============================================================================

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; Moniteur série USB — vitesse utilisée dans Serial.begin(115200)
monitor_speed = 115200

build_flags =
    -I include
    -D CORE_DEBUG_LEVEL=1

; Bibliothèques externes — une ligne par composant hardware
lib_deps =
    ; MQTT : publication vers Mosquitto (knolleary/PubSubClient)
    knolleary/PubSubClient@^2.8
    ; JSON : payload des mesures (format simulateur Node.js)
    bblanchon/ArduinoJson@^7.2.0
    ; MH-Z19B : CO₂ par UART (wifwaf/MH-Z19)
    wifwaf/MH-Z19@^1.5.4
    ; SDS011 : PM2.5 / PM10 par UART (lewapek)
    https://github.com/lewapek/sds-dust-sensors-arduino-library.git
    ; DHT22 : température et humidité
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    ; SGP30 : COV / TVOC sur I2C (capteur retenu — interface directe sans circuit analogique)
    adafruit/Adafruit SGP30 Sensor@^2.0.2
